<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CBSE Tutor</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-logo">✦ CBSE Tutor</div>
            <div class="new-chat-btn">+ New Chat</div>

            <!-- Class Selector -->
            <div class="sidebar-section">Class</div>
            <div class="class-selector">
                <div class="class-item active">Class 9</div>
                <div class="class-item">Class 10</div>
                <div class="class-item">Class 11</div>
                <div class="class-item">Class 12</div>
            </div>

            <!-- Subjects -->
            <div class="sidebar-section">Subjects</div>
            <div class="sidebar-item active">📐 Mathematics</div>
            <div class="sidebar-item">⚡ Physics</div>
            <div class="sidebar-item">🧪 Chemistry</div>
            <div class="sidebar-item">🧬 Biology</div>

            <!-- Recent -->
            <div class="sidebar-section">Recent</div>
            <div class="sidebar-item">Pythagoras Theorem</div>
            <div class="sidebar-item">Newton's Laws</div>

            <div class="sidebar-footer">CBSE · NCERT</div>
        </div>

        <!-- Main Chat -->
        <div class="main">
            <div class="chat-header">
                <span class="chat-title">Mathematics</span>
                <span class="chat-badge">Class 9</span>
            </div>

            <div class="chat-body" id="chat-body">
                <!-- Welcome message -->
                <div class="message tutor">
                    <div class="avatar">T</div>
                    <div class="bubble">
                        Hi! I'm your CBSE Class 9 Tutor 👋<br>
                        Ask me anything from <strong>Math or Physics</strong> — I'll explain it step by step.
                    </div>
                </div>
            </div>

            <div class="chat-input-area">
                <input type="text" id="question" placeholder="Ask a question..." />
                <button id="ask-btn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </div>
        </div>
    </div>
    <script src="js/app.js"></script>
</body>
</html>
