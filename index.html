<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CBSE Tutor</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

        <div class="header">

        </div>
    </div>
    <script src="js/app.js"></script>
</body>
</html>
